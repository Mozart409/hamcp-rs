name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build docs
        run: nix develop --command cargo doc --no-deps --all-features

      - name: Check doc tests
        run: nix develop --command cargo test --doc

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: documentation
          path: target/doc
          retention-days: 30

  deploy:
    name: Deploy Documentation
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v8
        with:
          name: documentation
          path: doc

      - name: Add index.html redirect
        run: |
          echo '<meta http-equiv="refresh" content="0;url=hamcp/index.html">' > doc/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc
          force_orphan: true
