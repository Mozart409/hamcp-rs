name: NixOS Module Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'flake.nix'
      - '.github/workflows/nixos-module.yml'
  push:
    branches: [main]
    paths:
      - 'flake.nix'
      - '.github/workflows/nixos-module.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    name: Evaluate NixOS Module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Evaluate NixOS module
        run: |
          nix eval --json .#nixosModules.default > /dev/null

  module-options:
    name: Check Module Options
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Test module options
        run: |
          # Create a minimal test to verify module options are valid
          cat > /tmp/test-module.nix << 'EOF'
          { pkgs, lib, ... }:
          {
            imports = [ (builtins.getFlake (toString /tmp/hamcp-src)).nixosModules.default ];

            services.hamcp = {
              enable = true;
              haUrl = "http://localhost:8123";
              haTokenFile = "/run/secrets/ha-token";
              port = 3000;
              openFirewall = true;
            };

            # Dummy system config for evaluation
            system.stateVersion = "24.11";
            boot.loader.grub.device = "/dev/null";
            fileSystems."/" = { device = "/dev/null"; fsType = "ext4"; };
          }
          EOF

          cp -r . /tmp/hamcp-src
          nix-instantiate --eval '<nixpkgs/nixos>' -A config.services.hamcp.enable \
            -I nixos-config=/tmp/test-module.nix
