name: Conventional Commits

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check Commit Messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check conventional commits
        run: nix develop --command cog check

  check-pr-title:
    name: Check PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          valid_types="feat|fix|docs|style|refactor|test|chore|build|ci|perf|revert"
          
          if echo "$PR_TITLE" | grep -qE "^($valid_types)(\(.+\))?: .+$"; then
            echo "PR title follows conventional commit format: $PR_TITLE"
          else
            echo "PR title does not follow conventional commit format: $PR_TITLE"
            echo ""
            echo "PR title should follow format: <type>[(scope)]: <description>"
            echo "Valid types: $valid_types"
            exit 1
          fi
