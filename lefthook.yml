# Lefthook configuration for Rust project
# https://lefthook.dev/configuration/
pre-commit:
  parallel: true
  jobs:
    - name: format
      glob: "*.rs"
      run: cargo fmt
      stage_fixed: true
    - name: clippy
      glob: "*.rs"
      run: cargo clippy --all-targets -- -D warnings
      stage_fixed: true
    - name: typos
      run: typos
      stage_fixed: true
    - name: actionlint
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint
      stage_fixed: true
    - name: keep-sorted
      glob: "flake.nix"
      run: keep-sorted --prefix='# BEGIN keep-sorted' --suffix='# END keep-sorted' flake.nix
      stage_fixed: true
pre-push:
  parallel: true
  jobs:
    - name: test
      run: cargo test
    - name: clippy-pedantic
      glob: "*.rs"
      run: cargo clippy -- -W clippy::pedantic
