[advisories]
version = 2
# The path where the advisory databases are cloned/updated
# db-path = "~/.cargo/advisory-db"
# The url(s) of the advisory databases to use
# db-urls = ["https://github.com/rustsec/advisory-db"]
# The lint level for crates that have been yanked from their source registry
yanked = "warn"
# The lint level for crates with security advisories
unmaintained = "warn"
unsound = "deny"

[licenses]
version = 2
# List of explicitly allowed licenses
# See https://spdx.org/licenses/ for list of possible licenses
# [possible values: any SPDX 3.11 short identifier (+ optional exception)].
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "Unlicense",
]
# The confidence threshold for detecting a license from license text.
# [possible values: any between 0.0 and 1.0].
confidence-threshold = 0.8

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Lint level for when a crate marked as 'wildcards' is encountered
wildcards = "allow"
# The graph highlighting used when creating dotgraphs for graphs
# with multiple versions
# default = "red" | "blue" | "green" | "purple" | "yellow"
highlight = "all"
# The default lint level for `default` features for crates that
# have been marked as 'banned'
default-features = "allow"
# List of crates that are allowed. Use with care!
allow = []
# List of crates to ban
deny = []

[sources]
# Lint level for what to happen when a crate from a crate registry
# that isn't in the allow list is encountered
unknown-registry = "warn"
# Lint level for what to happen when a crate from a git repository
# that isn't in the allow list is encountered
unknown-git = "warn"
# List of allowed crate registries. Defaults to crates.io if not specified.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# List of allowed Git repositories
allow-git = []
